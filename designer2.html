        return idx !== -1 ? { device: beltDevices[idx], index: idx } : null;
    }

    function deactivatePlacement() {
        placementActive = false;
        preview.active = false;
        updateUI();
    }

    function toggleBeltMode() {
        beltMode = !beltMode;
        if (beltMode) {
            placementActive = false;
            pipeMode = false;
            beltStart = null;
            beltPath = [];
            extendingBeltId = null;
            dragState.dragging = false;
            potentialDrag = null;
            pickedUpMachine = null;
            pickedUpBeltDevice = null;
            pickedUpPipeDevice = null;
        }
        updateUI();
        draw();
    }

    function togglePipeMode() {
        pipeMode = !pipeMode;
        if (pipeMode) {
            placementActive = false;
            beltMode = false;
            pipeStart = null;
            pipePath = [];
            extendingPipeId = null;
            dragState.dragging = false;
            potentialDrag = null;
            pickedUpMachine = null;
            pickedUpBeltDevice = null;
            pickedUpPipeDevice = null;
        }
        updateUI();
        draw();
    }

    function updateUI() {
        currentMachineSpan.textContent = curName ? `${curName} (${curW}x${curH})` : '未选择';

        if (pipeMode) {
            placementIndicator.innerHTML = '水管模式';
            placementIndicator.style.background = '#1e90ff';
            canvas.style.cursor = 'cell';   // 水管模式使用单元格光标
        } else if (beltMode) {
            placementIndicator.innerHTML = '传送带模式';
            placementIndicator.style.background = '#3e6f8a';
            canvas.style.cursor = 'crosshair';        // 传送带模式使用 十字准星光标
        } else if (placementActive) {
            placementIndicator.innerHTML = '放置模式';
            placementIndicator.style.background = '#3e9f5a';
            canvas.style.cursor = 'copy';        // 放置模式使用复制光标
        } else {
            placementIndicator.innerHTML = '待放置';
            placementIndicator.style.background = '#ca6f3e';
            canvas.style.cursor = 'default';     // 无模式时恢复默认箭头
        }
    }

    function buildMenu(menu, size, names) {
        menu.innerHTML = '';
        names.forEach(name => {
            const btn = document.createElement('button');
            btn.textContent = name;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const [w, h] = size.split('x').map(Number);
                curW = w; curH = h; curName = name;
                curDirection = (w > h) ? 1 : (h > w ? 0 : 0);
                placementActive = true;
                beltMode = false;
                pipeMode = false;
                beltStart = null;
                beltPath = [];
                extendingBeltId = null;
                updateUI();
                hideAllMenus();
                draw();
            });
            menu.appendChild(btn);
        });
    }
    buildMenu(menu2x2, '2x2', machineTypes['2x2']);
    buildMenu(menu3x3, '3x3', machineTypes['3x3']);
    buildMenu(menu5x5, '5x5', machineTypes['5x5']);
    buildMenu(menu4x6, '4x6', machineTypes['4x6']);

    function hideAllMenus() {
        menu2x2.style.display = 'none';
        menu3x3.style.display = 'none';
        menu5x5.style.display = 'none';
        menu4x6.style.display = 'none';
    }

    function showMenu(menu, btn) {
        hideAllMenus();
        const rect = btn.getBoundingClientRect();
        const panelRect = document.getElementById('controlPanel').getBoundingClientRect();
        menu.style.top = (rect.bottom - panelRect.top + 10) + 'px';
        menu.style.left = (rect.left - panelRect.left) + 'px';
        menu.style.display = 'grid';
    }

    btn2x2.addEventListener('click', (e) => { e.stopPropagation(); pipeMode = false; showMenu(menu2x2, btn2x2); });
    btn3x3.addEventListener('click', (e) => { e.stopPropagation(); pipeMode = false; showMenu(menu3x3, btn3x3); });
    btn5x5.addEventListener('click', (e) => { e.stopPropagation(); pipeMode = false; showMenu(menu5x5, btn5x5); });
    btn4x6.addEventListener('click', (e) => { e.stopPropagation(); pipeMode = false; showMenu(menu4x6, btn4x6); });
    beltBtn.addEventListener('click', toggleBeltMode);
    splitterBtn.addEventListener('click', () => {
        curW = 1; curH = 1; curName = '分流器'; curDirection = 0;
        placementActive = true;
        beltMode = false;
        pipeMode = false;
        beltStart = null; beltPath = []; extendingBeltId = null;
        hideAllMenus();
        updateUI();
        draw();
    });
    mergerBtn.addEventListener('click', () => {
        curW = 1; curH = 1; curName = '汇流器'; curDirection = 0;
        placementActive = true;
        beltMode = false;
        pipeMode = false;
        beltStart = null; beltPath = []; extendingBeltId = null;
        hideAllMenus();
        updateUI();
        draw();
    });
    pipeBtn.addEventListener('click', togglePipeMode);
    pipeSplitterBtn.addEventListener('click', () => {
        curW = 1; curH = 1; curName = '管道分流器'; curDirection = 0;
        placementActive = true;
        beltMode = false;
        pipeMode = false;
        pipeStart = null; pipePath = []; extendingPipeId = null;
        hideAllMenus();
        updateUI();
        draw();
    });
    pipeMergerBtn.addEventListener('click', () => {
        curW = 1; curH = 1; curName = '管道汇流器'; curDirection = 0;
        placementActive = true;
        beltMode = false;
        pipeMode = false;
        pipeStart = null; pipePath = []; extendingPipeId = null;
        hideAllMenus();
        updateUI();
        draw();
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.machine-menu') && !e.target.closest('.btn-group')) hideAllMenus();
    });

    canvas.addEventListener('mousemove', (e) => {
        const { ix, iy } = getGridFromEvent(e);
        preview.gridX = ix; preview.gridY = iy; preview.active = true;

        if (beltMode && beltStart) {
            const last = beltPath[beltPath.length-1];
            if (last && (last.x !== ix || last.y !== iy)) {
                // 1. 如果移动回到本次放置路径上的某个已有格子，，且该格子和当前格子之间所有的格子之间最多一次转弯，视为多格回退
                //找到该格子最后一次出现的位置
                const existingIndex = beltPath.findLastIndex((p, idx) => p.x === ix && p.y === iy);
                let isBackward = (existingIndex !== -1 && existingIndex < beltPath.length - 1);
                if (isBackward) {
                    let turnCount = 0;
                    let lastTurn = null;
                    for (let i = existingIndex + 1; i < beltPath.length; i++) {
                        const dx = beltPath[i].x - beltPath[i-1].x;
                        const dy = beltPath[i].y - beltPath[i-1].y;
                        if(!lastTurn) {
                            lastTurn = { x: dx, y: dy };
                        } else {
                            if (lastTurn.x !== dx || lastTurn.y !== dy) {
                                turnCount++;
                                if (turnCount > 1) {
                                    isBackward = false;
                                    break;
                                }
                                lastTurn = { x: dx, y: dy };
                            }
                        }
                    }
                }
                if (isBackward) {
                    beltPath = beltPath.slice(0, existingIndex + 1);
                    beltLengthSpan.textContent = beltPath.length;
                } else {
                    const dx = ix - last.x;
                    const dy = iy - last.y;
                    const manhattan = Math.abs(dx) + Math.abs(dy);

                    // 相邻一格的精细控制（仅向前扩展，不再做单步回退，回退统一走上面的多格逻辑）
                    if (manhattan === 1) {
                        const machine = getMachineAt(ix, iy);
                        if (machine) {
                            if (isMachineInputCell(machine, ix, iy)) beltPath.push({ x: ix, y: iy });
                        } else beltPath.push({ x: ix, y: iy });
                        beltLengthSpan.textContent = beltPath.length;
                    }
                    // 鼠标移动距离较长，自动按直线补全中间路径（仅支持横/竖直线）
                    else if (manhattan > 1 && (dx === 0 || dy === 0)) {
                        const stepX = dx === 0 ? 0 : (dx > 0 ? 1 : -1);
                        const stepY = dy === 0 ? 0 : (dy > 0 ? 1 : -1);
                        let curX = last.x;
                        let curY = last.y;
                        for (let s = 1; s <= manhattan; s++) {
                            curX += stepX;
                            curY += stepY;
                            const machine = getMachineAt(curX, curY);
                            const isLastStep = (s === manhattan);
                            if (machine) {
                                // 只允许在终点进入机器输入格，中途遇到机器则直接停止
                                if (isLastStep && isMachineInputCell(machine, curX, curY)) {
                                    beltPath.push({ x: curX, y: curY });
                                }
                                break;
                            } else {
                                beltPath.push({ x: curX, y: curY });
                            }
                        }
                        beltLengthSpan.textContent = beltPath.length;
                    }
                }
            }
        }

        if (pipeMode && pipeStart) {
            const last = pipePath[pipePath.length-1];
            if (last && (last.x !== ix || last.y !== iy) && Math.abs(last.x - ix) + Math.abs(last.y - iy) === 1) {
                if (pipePath.length >= 2) {
                    const secondLast = pipePath[pipePath.length-2];
                    if (secondLast.x === ix && secondLast.y === iy) pipePath.pop();
                    else {
                        const machine = getMachineAt(ix, iy);
                        // 检查是否是水流口
                        const ports = machine ? getWaterPorts(machine.x, machine.y, machine.w, machine.h, machine.name, machine.direction) : [];
                        const isValidPort = ports.some(p => p.x === ix && p.y === iy && p.isInput);
                        if (machine) {
                            if (isValidPort) pipePath.push({ x: ix, y: iy });
                        } else pipePath.push({ x: ix, y: iy });
                    }
                } else {
                    const machine = getMachineAt(ix, iy);
                    const ports = machine ? getWaterPorts(machine.x, machine.y, machine.w, machine.h, machine.name, machine.direction) : [];
                    const isValidPort = ports.some(p => p.x === ix && p.y === iy && p.isInput);
                    if (machine) {
                        if (isValidPort) pipePath.push({ x: ix, y: iy });
                    } else pipePath.push({ x: ix, y: iy });
                }
                beltLengthSpan.textContent = pipePath.length;
            }
        }

        if (potentialDrag) {
            const { startX, startY, machineIdx, offsetX, offsetY, originalMachine } = potentialDrag;
            if (Math.abs(ix - startX) + Math.abs(iy - startY) >= 1) {
                machines.splice(machineIdx, 1);
                rebuildGrid();
                dragState.dragging = true;
                dragState.originalMachine = originalMachine;
                dragState.dragOffsetX = offsetX;
                dragState.dragOffsetY = offsetY;
                dragState.currentGridX = originalMachine.x;
                dragState.currentGridY = originalMachine.y;
                potentialDrag = null;
                if (placementActive) deactivatePlacement();
            }
        }

        if (dragState.dragging) {
            dragState.currentGridX = ix - dragState.dragOffsetX;
            dragState.currentGridY = iy - dragState.dragOffsetY;
        }

        if (pickedUpMachine) {
            pickedUpMachine.gridX = ix - pickedUpMachine.offsetX;
            pickedUpMachine.gridY = iy - pickedUpMachine.offsetY;
        }

            pickedUpBeltDevice.gridX = ix - pickedUpBeltDevice.offsetX;
            pickedUpBeltDevice.gridY = iy - pickedUpBeltDevice.offsetY;
        }

        if (pickedUpPipeDevice) {
            pickedUpPipeDevice.gridX = ix - pickedUpPipeDevice.offsetX;
            pickedUpPipeDevice.gridY = iy - pickedUpPipeDevice.offsetY;
        }

    canvas.addEventListener('mouseleave', () => {
        preview.active = false;
        if (dragState.dragging && dragState.originalMachine) {
            machines.push({ ...dragState.originalMachine });
            rebuildGrid();
            dragState.dragging = false;
            dragState.originalMachine = null;
            potentialDrag = null;
            updateUI();

        draw();
    });

    canvas.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        const { ix, iy } = getGridFromEvent(e);

        if (beltMode) {
            e.preventDefault();
            if (!beltStart) {
                const machine = getMachineAt(ix, iy);
                const device = getBeltDeviceAt(ix, iy);
                if (machine) {
                    if (isMachineOutputCell(machine, ix, iy)) {
                        beltStart = { x: ix, y: iy, type: 'machineOutput', dir: machine.direction };
                        beltPath = [{ x: ix, y: iy }];
                        extendingBeltId = null;
                    }
                } else if (device) {
                    // 允许 beltDevice 作为起点，但需要后续方向匹配，这里先允许
                    beltStart = { x: ix, y: iy, type: 'beltDevice', device: device };
                    beltPath = [{ x: ix, y: iy }];
                    extendingBeltId = null;
                }else {
                    if (grid[iy][ix].beltIds.length > 0) {
                        const ids = grid[iy][ix].beltIds;
                        if (ids.length === 1) {
                            const pathId = ids[0];
                            const path = beltPaths.find(p => p.id === pathId);
                            if (path) {
                                const isRing = path.points.length >= 2 && 
                                path.points[0].x === path.points[path.points.length - 1].x && 
                                path.points[0].y === path.points[path.points.length - 1].y;
                                const idx = path.points.findIndex(p => p.x === ix && p.y === iy);
                                if (idx === path.points.length - 1 && !isRing) {
                                    beltStart = { x: ix, y: iy, type: 'beltEnd', dir: null };
                                    beltPath = [{ x: ix, y: iy }];
                                    extendingBeltId = pathId;
                                }
                            }
                        }
                    } else {
                        if (ix >= 0 && iy >= 0 && ix < GRID_SIZE && iy < GRID_SIZE &&
                            grid[iy][ix].machineId === null && grid[iy][ix].beltDeviceId === null && grid[iy][ix].beltIds.length === 0) {
                            beltStart = { x: ix, y: iy, type: 'empty', dir: null };
                            beltPath = [{ x: ix, y: iy }];
                            extendingBeltId = null;
                        }
                    }
                }
                updateUI();
                draw();
                return;
            }
            // ... 其余传送带处理保持不变 ...
            const machine = getMachineAt(ix, iy);
            if (machine && !isMachineInputCell(machine, ix, iy)) return;
            if (!machine && grid[iy][ix].machineId !== null) return;

            let endExtendId = null;
            if (!machine && grid[iy][ix].beltIds.length > 0) {
                const ids = grid[iy][ix].beltIds;
                if (ids.length === 1) {
                    const pathId = ids[0];
                    const path = beltPaths.find(p => p.id === pathId);
                    if (path) {
                        const isRing = path.points.length >= 2 && 
                        path.points[0].x === path.points[path.points.length - 1].x && 
                        path.points[0].y === path.points[path.points.length - 1].y;
                        const idx = path.points.findIndex(p => p.x === ix && p.y === iy);
                        if (idx === 0 && !isRing) endExtendId = pathId;
                    }
                }
            }
            if (beltPath.length >= 2 && ix === beltPath[0].x && iy === beltPath[0].y) {
                if (grid[iy][ix].machineId === null && grid[iy][ix].beltDeviceId === null && grid[iy][ix].beltIds.length === 0) {
                    const closedPath = beltPath;
                    if (isBeltPathValid(closedPath, [])) {
                        beltPaths.push({ id: nextBeltId++, points: closedPath });
                        beltStart = null;
                        beltPath = [];
                        extendingBeltId = null;
                        rebuildGrid();
                        updateUI();
                        draw();
                        return;
                    }
                }
                return;
            }
            const idxInPath = beltPath.findIndex(p => p.x === ix && p.y === iy);
            if (idxInPath !== -1) {
                beltPath = beltPath.slice(0, idxInPath + 1);
            } else {
                const last = beltPath[beltPath.length - 1];
                if (Math.abs(last.x - ix) + Math.abs(last.y - iy) !== 1) return;
                beltPath.push({ x: ix, y: iy });
            }

            const ignoreIds = [extendingBeltId, endExtendId].filter(id => id !== null);
            const fullValid = isBeltPathValid(beltPath, ignoreIds);
            let dirMatch = true;
            if (beltPath.length >= 2) {
                const lastDir = getDirection(beltPath[beltPath.length - 2], beltPath[beltPath.length - 1]);
                const machine = getMachineAt(ix, iy);
                const device = getBeltDeviceAt(ix, iy);
                if (machine && !isSplitterOrMerger(machine.name)) {
                    if (!isMachineInputCell(machine, ix, iy) || lastDir !== machine.direction) dirMatch = false;
                } else if (device) {
                    if (!isBeltDeviceInputDir(device, (lastDir+2)%4)) dirMatch = false;
                }
            }

            if (fullValid && dirMatch && beltPath.length >= 2) {
                if (extendingBeltId !== null && endExtendId !== null) {
                    if (extendingBeltId === endExtendId) {
                        const originalPath = beltPaths.find(p => p.id === extendingBeltId);
                        if (originalPath) originalPath.points = originalPath.points.concat(beltPath.slice(1));
                    } else {
                        const pathA = beltPaths.find(p => p.id === extendingBeltId);
                        const pathB = beltPaths.find(p => p.id === endExtendId);
                        if (pathA && pathB) {
                            const middle = beltPath.slice(1, -1);
                            pathA.points = [...pathA.points, ...middle, ...pathB.points];
                            beltPaths = beltPaths.filter(p => p.id !== endExtendId);
                        }
                    }
                } else if (extendingBeltId !== null) {
                    const originalPath = beltPaths.find(p => p.id === extendingBeltId);
                    if (originalPath) originalPath.points = originalPath.points.concat(beltPath.slice(1));
                } else if (endExtendId !== null) {
                    const originalPath = beltPaths.find(p => p.id === endExtendId);
                    if (originalPath) originalPath.points = beltPath.slice(0, -1).concat(originalPath.points);
                } else {
                    const id = nextBeltId++;
                    beltPaths.push({ id, points: beltPath.map(p => ({ x: p.x, y: p.y })) });
                }
                rebuildGrid();
                beltStart = null;
                beltPath = [];
                extendingBeltId = null;
            } else {
                if (idxInPath === -1) beltPath.pop();
            }
            updateUI();
            draw();
            return;
        }

        // 水管模式处理
        if (pipeMode) {
            e.preventDefault();
            if (!pipeStart) {
                // 初始化水管路径
                const machine = getMachineAt(ix, iy);
                const device = getPipeDeviceAt(ix, iy);
                if (machine) {
                    // 检查是否是水流输出口
                    const ports = getWaterPorts(machine.x, machine.y, machine.w, machine.h, machine.name, machine.direction);
                    const hasOutput = ports.some(p => p.x === ix && p.y === iy && !p.isInput);
                    if (hasOutput) {
                        pipeStart = { x: ix, y: iy, type: 'machineOutput' };
                        pipePath = [{ x: ix, y: iy }];
                        extendingPipeId = null;
                    }
                } else if (device) {
                    pipeStart = { x: ix, y: iy, type: 'pipeDevice', device: device };
                    pipePath = [{ x: ix, y: iy }];
                    extendingPipeId = null;
                } else {
                    if (grid[iy][ix].pipeIds.length > 0) {
                        const ids = grid[iy][ix].pipeIds;
                        if (ids.length === 1) {
                            const pathId = ids[0];
                            const path = pipePaths.find(p => p.id === pathId);
                            if (path) {
                                const isRing = path.points.length >= 2 && 
                                path.points[0].x === path.points[path.points.length - 1].x && 
                                path.points[0].y === path.points[path.points.length - 1].y;
                                const idx = path.points.findIndex(p => p.x === ix && p.y === iy);
                                if (idx === path.points.length - 1 && !isRing) {
                                    pipeStart = { x: ix, y: iy, type: 'pipeEnd' };
                                    pipePath = [{ x: ix, y: iy }];
                                    extendingPipeId = pathId;
                                }
                            }
                        }
                    } else {
                        if (ix >= 0 && iy >= 0 && ix < GRID_SIZE && iy < GRID_SIZE &&
                            grid[iy][ix].machineId === null && grid[iy][ix].pipeDeviceId === null && grid[iy][ix].pipeIds.length === 0) {
                            pipeStart = { x: ix, y: iy, type: 'empty' };
                            pipePath = [{ x: ix, y: iy }];
                            extendingPipeId = null;
                        }
                    }
                }
                updateUI();
                draw();
                return;
            }
            // 继续放置水管
            const machine = getMachineAt(ix, iy);
            if (machine) {
                // 检查是否是水流输入口
                const ports = getWaterPorts(machine.x, machine.y, machine.w, machine.h, machine.name, machine.direction);
                const isValidInput = ports.some(p => p.x === ix && p.y === iy && p.isInput);
                if (!isValidInput) return;
            }
            if (!machine && grid[iy][ix].machineId !== null) return;

            let endExtendId = null;
            if (!machine && grid[iy][ix].pipeIds.length > 0) {
                const ids = grid[iy][ix].pipeIds;
                if (ids.length === 1) {
                    const pathId = ids[0];
                    const path = pipePaths.find(p => p.id === pathId);
                    if (path) {
                        const isRing = path.points.length >= 2 && 
                        path.points[0].x === path.points[path.points.length - 1].x && 
                        path.points[0].y === path.points[path.points.length - 1].y;
                        const idx = path.points.findIndex(p => p.x === ix && p.y === iy);
                        if (idx === 0 && !isRing) endExtendId = pathId;
                    }
                }
            }
            if (pipePath.length >= 2 && ix === pipePath[0].x && iy === pipePath[0].y) {
                if (grid[iy][ix].machineId === null && grid[iy][ix].pipeDeviceId === null && grid[iy][ix].pipeIds.length === 0) {
                    const closedPath = pipePath;
                    if (isPipePathValid(closedPath, [])) {
                        pipePaths.push({ id: nextPipeId++, points: closedPath });
                        pipeStart = null;
                        pipePath = [];
                        extendingPipeId = null;
                        rebuildGrid();
                        updateUI();
                        draw();
                        return;
                    }
                }
                return;
            }
            const idxInPath = pipePath.findIndex(p => p.x === ix && p.y === iy);
            if (idxInPath !== -1) {
                pipePath = pipePath.slice(0, idxInPath + 1);
            } else {
                const last = pipePath[pipePath.length - 1];
                if (Math.abs(last.x - ix) + Math.abs(last.y - iy) !== 1) return;
                pipePath.push({ x: ix, y: iy });
            }

            const ignoreIds = [extendingPipeId, endExtendId].filter(id => id !== null);
            let fullValid = isPipePathValid(pipePath, ignoreIds);
            let dirMatch = true;
            if (pipePath.length >= 2) {
                const lastDir = getDirection(pipePath[pipePath.length - 2], pipePath[pipePath.length - 1]);
                const machine = getMachineAt(ix, iy);
                const device = getPipeDeviceAt(ix, iy);
                if (machine) {
                    const ports = getWaterPorts(machine.x, machine.y, machine.w, machine.h, machine.name, machine.direction);
                    const isValidInput = ports.some(p => p.x === ix && p.y === iy && p.isInput);
                    if (!isValidInput) dirMatch = false;
                } else if (device) {
                    if (!isPipeDeviceInputDir(device, (lastDir+2)%4)) dirMatch = false;
                }
            }

            if (fullValid && dirMatch && pipePath.length >= 2) {
                if (extendingPipeId !== null && endExtendId !== null) {
                    if (extendingPipeId === endExtendId) {
                        const originalPath = pipePaths.find(p => p.id === extendingPipeId);
                        if (originalPath) originalPath.points = originalPath.points.concat(pipePath.slice(1));
                    } else {
                        const pathA = pipePaths.find(p => p.id === extendingPipeId);
                        const pathB = pipePaths.find(p => p.id === endExtendId);
                        if (pathA && pathB) {
                            const middle = pipePath.slice(1, -1);
                            pathA.points = [...pathA.points, ...middle, ...pathB.points];
                            pipePaths = pipePaths.filter(p => p.id !== endExtendId);
                        }
                    }
                } else if (extendingPipeId !== null) {
                    const originalPath = pipePaths.find(p => p.id === extendingPipeId);
                    if (originalPath) originalPath.points = originalPath.points.concat(pipePath.slice(1));
                } else if (endExtendId !== null) {
                    const originalPath = pipePaths.find(p => p.id === endExtendId);
                    if (originalPath) originalPath.points = pipePath.slice(0, -1).concat(originalPath.points);
                } else {
                    const id = nextPipeId++;
                    pipePaths.push({ id, points: pipePath.map(p => ({ x: p.x, y: p.y })) });
                }
                rebuildGrid();
                pipeStart = null;
                pipePath = [];
                extendingPipeId = null;
            } else {
                if (idxInPath === -1) pipePath.pop();
            }
            updateUI();
            draw();
            return;
        }

        if (pickedUpMachine || pickedUpBeltDevice || pickedUpPipeDevice) { e.preventDefault(); return; }

        // 优先检查是否点中beltDevice
        const pipeDeviceHit = findPipeDeviceIndexAt(ix, iy);
        if (pipeDeviceHit) {
            e.preventDefault();
            // 启动pipeDevice拖拽 (简易: 直接拾起)
            const device = { ...pipeDeviceHit.device };
            pipeDevices.splice(pipeDeviceHit.index, 1);
            rebuildGrid();
            if (placementActive) deactivatePlacement();
            dragState.dragging = false; potentialDrag = null;
            const offsetX = ix - device.x, offsetY = iy - device.y;
            pickedUpPipeDevice = { device, offsetX, offsetY, gridX: device.x, gridY: device.y };
            updateUI(); draw();
            return;
        }

        const deviceHit = findBeltDeviceIndexAt(ix, iy);
        if (deviceHit) {
            e.preventDefault();
            // 启动beltDevice拖拽 (简易: 直接拾起)
            const device = { ...deviceHit.device };
            beltDevices.splice(deviceHit.index, 1);
            rebuildGrid();
            if (placementActive) deactivatePlacement();
            dragState.dragging = false; potentialDrag = null;
            const offsetX = ix - device.x, offsetY = iy - device.y;
            pickedUpBeltDevice = { device, offsetX, offsetY, gridX: device.x, gridY: device.y };
            updateUI(); draw();
            return;
        }

        const hit = findMachineIndexAt(ix, iy);
        if (hit) {
            e.preventDefault();
            potentialDrag = {
                machineIdx: hit.index,
                startX: ix, startY: iy,
                offsetX: ix - hit.machine.x,
                offsetY: iy - hit.machine.y,
                originalMachine: { ...hit.machine }
            };
            return;
        }

        if (placementActive) {
            e.preventDefault();
            if (isPipeSplitterOrMerger(curName)) {
                // 放置管道分流器/汇流器
                if (isAreaFree(ix, iy, 1, 1, null, curDirection, null)) {
                    const newDevice = {
                        id: nextPipeDeviceId++,
                        x: ix, y: iy,
                        w: 1, h: 1,
                        name: curName,
                        direction: curDirection
                    };
                    pipeDevices.push(newDevice);
                    rebuildGrid();
                    updateUI();
                    if (!zPressed) deactivatePlacement();
                    draw();
                } else draw();
            } else if (isSplitterOrMerger(curName)) {
                // 放置分流器/汇流器
                if (isAreaFree(ix, iy, 1, 1, null, curDirection, null)) {
                    const newDevice = {
                        id: nextBeltDeviceId++,
                        x: ix, y: iy,
                        w: 1, h: 1,
                        name: curName,
                        direction: curDirection
                    };
                    beltDevices.push(newDevice);
                    rebuildGrid();
                    updateUI();
                    if (!zPressed) deactivatePlacement();
                    draw();
                } else draw();
            } else {
                // 放置普通机器
                if (isAreaFree(ix, iy, curW, curH, null, curDirection, null)) {
                    const newMachine = {
                        id: nextMachineId++,
                        x: ix, y: iy, w: curW, h: curH,
                        name: curName, direction: curDirection
                    };
                    machines.push(newMachine);
                    rebuildGrid();
                    updateUI();
                    if (!zPressed) deactivatePlacement();
                    draw();
                } else draw();
            }
        }
    });

    function findPipeDeviceIndexAt(ix, iy) {
        const did = (ix>=0 && ix<GRID_SIZE && iy>=0 && iy<GRID_SIZE) ? grid[iy][ix].pipeDeviceId : null;
        if (did === null) return null;
        const idx = pipeDevices.findIndex(d => d.id === did);
        return idx !== -1 ? { device: pipeDevices[idx], index: idx } : null;
    }

    canvas.addEventListener('mouseup', (e) => {
        if (e.button !== 0) return;
        if (pickedUpMachine) {
            const { machine, gridX, gridY } = pickedUpMachine;
            if (isAreaFree(gridX, gridY, machine.w, machine.h, machine.id, machine.direction, null, null)) {
                machine.x = gridX; machine.y = gridY;
                machines.push(machine);
                rebuildGrid();
                pickedUpMachine = null;
                updateUI(); draw();
            } else { draw(); }
            return;
        }
        if (pickedUpPipeDevice) {
            const { device, gridX, gridY } = pickedUpPipeDevice;
            if (isAreaFree(gridX, gridY, 1, 1, null, device.direction, null, device.id)) {
                device.x = gridX; device.y = gridY;
                pipeDevices.push(device);
                rebuildGrid();
                pickedUpPipeDevice = null;
                updateUI(); draw();
            } else { draw(); }
            return;
        }
        if (pickedUpBeltDevice) {
            const { device, gridX, gridY } = pickedUpBeltDevice;
            if (isAreaFree(gridX, gridY, 1, 1, null, device.direction, device.id, null)) {
                device.x = gridX; device.y = gridY;
                beltDevices.push(device);
                rebuildGrid();
                pickedUpBeltDevice = null;
                updateUI(); draw();
            } else { draw(); }
            return;
        }
        if (potentialDrag) { potentialDrag = null; }
        if (dragState.dragging && dragState.originalMachine) {
            const { originalMachine, currentGridX, currentGridY } = dragState;
            if (isAreaFree(currentGridX, currentGridY, originalMachine.w, originalMachine.h, originalMachine.id, originalMachine.direction, null)) {
                originalMachine.x = currentGridX; originalMachine.y = currentGridY;
                machines.push(originalMachine);
            } else {
                machines.push({ ...originalMachine });
            }
            rebuildGrid();
            dragState.dragging = false;
            dragState.originalMachine = null;
            updateUI(); draw();
        }
    });

    canvas.addEventListener('dblclick', (e) => {
        if(beltMode || pipeMode){return;}
        e.preventDefault();
        const { ix, iy } = getGridFromEvent(e);
        // 优先pipeDevice
        const pipeDeviceHit = findPipeDeviceIndexAt(ix, iy);
        if (pipeDeviceHit) {
            const device = { ...pipeDeviceHit.device };
            pipeDevices.splice(pipeDeviceHit.index, 1);
            rebuildGrid();
            if (placementActive) deactivatePlacement();
            dragState.dragging = false; potentialDrag = null;
            const offsetX = ix - device.x, offsetY = iy - device.y;
            pickedUpPipeDevice = { device, offsetX, offsetY, gridX: device.x, gridY: device.y };
            updateUI(); draw();
            return;
        }
        // 再检查beltDevice
        const deviceHit = findBeltDeviceIndexAt(ix, iy);
        if (deviceHit) {
            const device = { ...deviceHit.device };
            beltDevices.splice(deviceHit.index, 1);
            rebuildGrid();
            if (placementActive) deactivatePlacement();
            dragState.dragging = false; potentialDrag = null;
            const offsetX = ix - device.x, offsetY = iy - device.y;
            pickedUpBeltDevice = { device, offsetX, offsetY, gridX: device.x, gridY: device.y };
            updateUI(); draw();
            return;
        }
        const hit = findMachineIndexAt(ix, iy);
        if (hit) {
            const machine = { ...hit.machine };
            machines.splice(hit.index, 1);
            rebuildGrid();
            if (placementActive) deactivatePlacement();
            dragState.dragging = false; potentialDrag = null;
            const offsetX = ix - machine.x, offsetY = iy - machine.y;
            pickedUpMachine = { machine, offsetX, offsetY, gridX: machine.x, gridY: machine.y };
            updateUI(); draw();
        }
    });

    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const { ix, iy } = getGridFromEvent(e);

        // 水管模式下的特殊处理
        if (pipeMode) {
            if (pipeStart !== null) {
                // 正在放置新水管：右键取消本次放置，不清除水管模式
                pipeStart = null;
                pipePath = [];
                extendingPipeId = null;
            } else {
                // 空闲水管模式：只删除光标下的水管和管道分流器汇流器（如果有）
                const pipeDeviceHit = findPipeDeviceIndexAt(ix, iy);
                if (pipeDeviceHit) {
                    pipeDevices.splice(pipeDeviceHit.index, 1);
                    rebuildGrid();
                    updateUI();
                    draw();
                    return;
                }
                if (grid[iy][ix].pipeIds.length > 0) {
                    const id = grid[iy][ix].pipeIds[0];
                    const index = pipePaths.findIndex(p => p.id === id);
                    if (index !== -1) {
                        pipePaths.splice(index, 1);
                        rebuildGrid();
                    }
                }
            }
        } else if (beltMode) {
            if (beltStart !== null) {
                // 正在放置新传送带：右键取消本次放置，不清除传送带模式
                beltStart = null;
                beltPath = [];
                extendingBeltId = null;
            } else {
                // 空闲传送带模式：只删除光标下的传送带和分流器汇流器（如果有）
                //优先删除分汇流器
                const deviceHit = findBeltDeviceIndexAt(ix, iy);
                if (deviceHit && (deviceHit.device.name === '分流器' || deviceHit.device.name === '汇流器')) {
                    beltDevices.splice(deviceHit.index, 1);
                    rebuildGrid();
                    updateUI();
                    draw();
                    return;
                }
                if (grid[iy][ix].beltIds.length > 0) {
                    const id = grid[iy][ix].beltIds[0];
                    const index = beltPaths.findIndex(p => p.id === id);
                    if (index !== -1) {
                        beltPaths.splice(index, 1);
                        rebuildGrid();
                    }
                }
                // 如果光标下没有传送带，什么也不做（保持传送带模式激活）
            }
        } else {
            // 非传送带/水管模式：原有逻辑（删除机器/分流汇流器/传送带/水管）
            const pipeDeviceHit = findPipeDeviceIndexAt(ix, iy);
            if (pipeDeviceHit && (pipeDeviceHit.device.name === '管道分流器' || pipeDeviceHit.device.name === '管道汇流器')) {
                pipeDevices.splice(pipeDeviceHit.index, 1);
                rebuildGrid();
            } else {
                const deviceHit = findBeltDeviceIndexAt(ix, iy);
                if (deviceHit) {
                    beltDevices.splice(deviceHit.index, 1);
                    rebuildGrid();
                } else {
                    const hit = findMachineIndexAt(ix, iy);
                    if (hit) {
                        machines.splice(hit.index, 1);
                        rebuildGrid();
                    } else if (grid[iy][ix].pipeIds.length > 0) {
                        const ids = grid[iy][ix].pipeIds;
                        if (ids.length > 0) {
                            const id = ids[0];
                            const index = pipePaths.findIndex(p => p.id === id);
                            if (index !== -1) {
                                pipePaths.splice(index, 1);
                                rebuildGrid();
                            }
                        }
                    } else if (grid[iy][ix].beltIds.length > 0) {
                        const ids = grid[iy][ix].beltIds;
                        if (ids.length > 0) {
                            const id = ids[0];
                            const index = beltPaths.findIndex(p => p.id === id);
                            if (index !== -1) {
                                beltPaths.splice(index, 1);
                                rebuildGrid();
                            }
                        }
                    } else {
                        if (placementActive) deactivatePlacement();
                        if (pickedUpMachine) pickedUpMachine = null;
                        if (pickedUpBeltDevice) pickedUpBeltDevice = null;
                        if (pickedUpPipeDevice) pickedUpPipeDevice = null;
                    }
                }
            }
        }

        // 清理拖拽状态
        if (potentialDrag) potentialDrag = null;
        if (dragState.dragging) {
            dragState.dragging = false;
            dragState.originalMachine = null;
        }

        updateUI();
        draw();
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'z' || e.key === 'Z') { zPressed = true; e.preventDefault(); }
        if (e.key === 'r' || e.key === 'R') {
            e.preventDefault();
            if (pickedUpBeltDevice) {
                const d = pickedUpBeltDevice.device;
                d.direction = (d.direction + 1) % 4;
                draw();
            } else if (pickedUpPipeDevice) {
                const d = pickedUpPipeDevice.device;
                d.direction = (d.direction + 1) % 4;
                draw();
            } else if (pickedUpMachine) {
                const m = pickedUpMachine.machine;
                m.direction = (m.direction + 1) % 4;
                [m.w, m.h] = [m.h, m.w];
                draw();
            } else if (potentialDrag && potentialDrag.originalMachine) {
                const idx = potentialDrag.machineIdx;
                const machine = machines[idx];
                if (machine) {
                    machine.direction = (machine.direction + 1) % 4;
                    [machine.w, machine.h] = [machine.h, machine.w];
                    potentialDrag.originalMachine = { ...machine };
                    potentialDrag.offsetX = potentialDrag.startX - machine.x;
                    potentialDrag.offsetY = potentialDrag.startY - machine.y;
                    rebuildGrid(); draw();
                }
            } else if (dragState.dragging && dragState.originalMachine) {
                const m = dragState.originalMachine;
                m.direction = (m.direction + 1) % 4;
                [m.w, m.h] = [m.h, m.w];
                draw();
            } else if (placementActive) {
                curDirection = (curDirection + 1) % 4;
                [curW, curH] = [curH, curW];
                updateUI(); draw();
            }
        }
        if (e.key === 'e' || e.key === 'E') { e.preventDefault(); toggleBeltMode(); }
        if (e.key === 'q' || e.key === 'Q') { e.preventDefault(); togglePipeMode(); }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'z' || e.key === 'Z') { zPressed = false; e.preventDefault(); }
    });

    rotateBtn.addEventListener('click', () => {
        if (pickedUpBeltDevice) {
            const d = pickedUpBeltDevice.device;
            d.direction = (d.direction + 1) % 4;
            draw();
        } else if (pickedUpMachine) {
            const m = pickedUpMachine.machine;
            m.direction = (m.direction + 1) % 4;
            [m.w, m.h] = [m.h, m.w];
            draw();
        } else if (potentialDrag && potentialDrag.originalMachine) {
            const idx = potentialDrag.machineIdx;
            const machine = machines[idx];
            if (machine) {
                machine.direction = (machine.direction + 1) % 4;
                [machine.w, machine.h] = [machine.h, machine.w];
                potentialDrag.originalMachine = { ...machine };
                potentialDrag.offsetX = potentialDrag.startX - machine.x;
                potentialDrag.offsetY = potentialDrag.startY - machine.y;
                rebuildGrid(); draw();
            }
        } else if (dragState.dragging && dragState.originalMachine) {
            const m = dragState.originalMachine;
            m.direction = (m.direction + 1) % 4;
            [m.w, m.h] = [m.h, m.w];
            draw();
        } else if (placementActive) {
            curDirection = (curDirection + 1) % 4;
            [curW, curH] = [curH, curW];
            updateUI(); draw();
        }
    });

    clearBtn.addEventListener('click', () => {
        machines = [];
        beltPaths = [];
        beltDevices = [];
        pipePaths = [];
        pipeDevices = [];
        nextMachineId = 0; nextBeltId = 0; nextBeltDeviceId = 0; nextPipeId = 0; nextPipeDeviceId = 0;
        rebuildGrid();
        if (placementActive) deactivatePlacement();
        dragState.dragging = false; potentialDrag = null; pickedUpMachine = null; pickedUpBeltDevice = null;
        beltMode = false; beltStart = null; beltPath = [];
        extendingBeltId = null;
        pipeMode = false; pipeStart = null; pipePath = [];
        extendingPipeId = null;
        updateUI(); draw();
    });

    // 缩放按钮事件
    if (zoomInBtn) {
        zoomInBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            setZoom(zoom + ZOOM_STEP);
        });
    }
    if (zoomOutBtn) {
        zoomOutBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            setZoom(zoom - ZOOM_STEP);
        });
    }
    if (zoomResetBtn) {
        zoomResetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const oldZoom = zoom;
            zoom = 1;
            applyZoom(oldZoom);
            draw();
        });
    }

    function init() {
        curW = 2; curH = 2; curName = '供电桩';
        curDirection = 0;
        placementActive = false;
        rebuildGrid();
        updateUI();
        applyZoom(zoom);
        draw();
    }
    init();
})();
</script>
</body>
</html>
